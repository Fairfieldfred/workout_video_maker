<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Video Builder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    background: #1a1a2e;
    border-bottom: 2px solid #FF6B35;
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 { font-size: 24px; color: white; }
  header h1 span { color: #FF6B35; }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .panel {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid #2a2a4a;
  }

  .panel h2 {
    font-size: 18px;
    margin-bottom: 16px;
    color: white;
  }

  .panel h2 span { color: #FF6B35; font-weight: normal; font-size: 14px; }

  /* Workout Settings */
  .settings-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    background: #12122a;
    color: white;
    font-size: 14px;
    outline: none;
  }

  .field input:focus, .field select:focus {
    border-color: #FF6B35;
  }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .filters input, .filters select {
    padding: 8px 12px;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    background: #12122a;
    color: white;
    font-size: 13px;
    outline: none;
  }

  .filters input { flex: 1; min-width: 150px; }
  .filters select { min-width: 120px; }
  .filters input:focus, .filters select:focus { border-color: #FF6B35; }

  /* Exercise List */
  .exercise-list {
    max-height: 500px;
    overflow-y: auto;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
  }

  .exercise-item {
    padding: 10px 14px;
    border-bottom: 1px solid #1f1f3a;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.15s;
  }

  .exercise-item:hover { background: #252545; }
  .exercise-item:last-child { border-bottom: none; }

  .exercise-item .name { font-size: 14px; color: white; }
  .exercise-item .meta {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }

  .exercise-item .add-btn {
    background: #FF6B35;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .exercise-item .add-btn:hover { background: #e55a25; }

  /* Workout Exercises */
  .workout-exercises {
    min-height: 200px;
  }

  .workout-exercise {
    background: #12122a;
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
  }

  .workout-exercise .exercise-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .workout-exercise .exercise-header h3 {
    font-size: 16px;
    color: white;
  }

  .workout-exercise .exercise-header .exercise-meta {
    font-size: 12px;
    color: #FF6B35;
  }

  .workout-exercise .remove-btn {
    background: none;
    border: 1px solid #555;
    color: #888;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  .workout-exercise .remove-btn:hover {
    border-color: #FF3B30;
    color: #FF3B30;
  }

  .exercise-config {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }

  .exercise-config .field label { font-size: 11px; }
  .exercise-config .field input, .exercise-config .field select {
    padding: 8px 10px;
    font-size: 13px;
  }

  .setup-config {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 10px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #2a2a4a;
  }

  /* Move buttons */
  .move-btns {
    display: flex;
    gap: 4px;
    margin-right: 8px;
  }

  .move-btn {
    background: none;
    border: 1px solid #444;
    color: #888;
    border-radius: 4px;
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .move-btn:hover { border-color: #FF6B35; color: #FF6B35; }

  /* Actions */
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-primary {
    background: #FF6B35;
    color: white;
    flex: 1;
  }

  .btn-primary:hover { background: #e55a25; }

  .btn-secondary {
    background: #2a2a4a;
    color: white;
  }

  .btn-secondary:hover { background: #3a3a5a; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #12122a; }
  ::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a4a6a; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #555;
    font-size: 14px;
  }

  .workout-summary {
    background: #12122a;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 24px;
    font-size: 13px;
  }

  .workout-summary .stat { color: #888; }
  .workout-summary .stat strong { color: #FF6B35; }

  /* Color inputs */
  .color-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .color-row input[type="color"] {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: none;
    padding: 0;
  }

  .color-row input[type="text"] { flex: 1; }

  .exercise-count {
    background: #FF6B35;
    color: white;
    border-radius: 12px;
    padding: 2px 8px;
    font-size: 11px;
    margin-left: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>Workout <span>Video Builder</span></h1>
  <div style="font-size: 13px; color: #888;">Build workout JSON for the Remotion video renderer</div>
</header>

<div class="container">
  <!-- LEFT: Exercise Library -->
  <div>
    <div class="panel">
      <h2>Exercise Library <span id="exerciseCount"></span></h2>
      <div class="filters">
        <input type="text" id="searchInput" placeholder="Search exercises...">
        <select id="muscleFilter"><option value="">All Muscles</option></select>
        <select id="equipmentFilter"><option value="">All Equipment</option></select>
      </div>
      <div class="exercise-list" id="exerciseList"></div>
    </div>
  </div>

  <!-- RIGHT: Workout Builder -->
  <div>
    <div class="panel">
      <h2>Workout Settings</h2>
      <div class="field">
        <label>Workout Title</label>
        <input type="text" id="workoutTitle" value="My Workout" placeholder="e.g. Push Day - Week 1">
      </div>
      <div class="settings-row">
        <div class="field">
          <label>Subtitle</label>
          <input type="text" id="workoutSubtitle" value="Intermediate" placeholder="e.g. 45 min | Intermediate">
        </div>
        <div class="field">
          <label>Cooldown (seconds)</label>
          <input type="number" id="cooldownDuration" value="60" min="0" max="600">
        </div>
      </div>
      <div class="settings-row">
        <div class="field">
          <label>Primary Color</label>
          <div class="color-row">
            <input type="color" id="primaryColorPicker" value="#FF6B35">
            <input type="text" id="primaryColor" value="#FF6B35">
          </div>
        </div>
        <div class="field">
          <label>Background Color</label>
          <div class="color-row">
            <input type="color" id="bgColorPicker" value="#1A1A2E">
            <input type="text" id="bgColor" value="#1A1A2E">
          </div>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top: 16px;">
      <h2>Workout Exercises <span id="workoutExerciseCount"></span></h2>
      <div class="workout-summary" id="workoutSummary" style="display:none;">
        <div class="stat">Exercises: <strong id="sumExercises">0</strong></div>
        <div class="stat">Total Sets: <strong id="sumSets">0</strong></div>
        <div class="stat">Duration: <strong id="sumDuration">0:00</strong></div>
      </div>
      <div class="workout-exercises" id="workoutExercises">
        <div class="empty-state">Click "Add" on exercises from the library to build your workout.</div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="downloadJSON()">Download JSON</button>
        <button class="btn btn-secondary" onclick="copyJSON()">Copy to Clipboard</button>
        <button class="btn btn-secondary" onclick="clearWorkout()">Clear All</button>
      </div>
    </div>
  </div>
</div>

// ---- Parse CSV ----
function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const exercises = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // Simple CSV parse handling quoted fields
    const parts = [];
    let current = '';
    let inQuotes = false;
    for (const ch of line) {
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { parts.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    parts.push(current.trim());
    if (parts.length >= 3) {
      exercises.push({ name: parts[0], muscle: parts[1], equipment: parts[2] });
    }
  }
  return exercises;
}

const allExercises = parseCSV(CSV_DATA);

// ---- Get unique filter values ----
const muscles = [...new Set(allExercises.map(e => e.muscle))].sort();
const equipment = [...new Set(allExercises.map(e => e.equipment))].sort();

// ---- State ----
let workoutExercises = []; // { id, name, muscle, equipment, sets, reps, setDuration, restBetween, restAfter, setupTime, setupNote, timerMode }

// ---- Init filters ----
const muscleFilter = document.getElementById('muscleFilter');
const equipmentFilter = document.getElementById('equipmentFilter');
muscles.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; muscleFilter.appendChild(o); });
equipment.forEach(e => { const o = document.createElement('option'); o.value = e; o.textContent = e; equipmentFilter.appendChild(o); });

// ---- Render exercise list ----
function renderExerciseList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const muscle = muscleFilter.value;
  const equip = equipmentFilter.value;

  const filtered = allExercises.filter(e => {
    if (search && !e.name.toLowerCase().includes(search)) return false;
    if (muscle && e.muscle !== muscle) return false;
    if (equip && e.equipment !== equip) return false;
    return true;
  });

  const list = document.getElementById('exerciseList');
  list.innerHTML = filtered.map((e, i) => `
    <div class="exercise-item">
      <div>
        <div class="name">${e.name}</div>
        <div class="meta">${e.muscle} &middot; ${e.equipment}</div>
      </div>
      <button class="add-btn" onclick="addExercise('${e.name.replace(/'/g, "\\'")}', '${e.muscle.replace(/'/g, "\\'")}', '${e.equipment.replace(/'/g, "\\'")}')">+ Add</button>
    </div>
  `).join('');

  document.getElementById('exerciseCount').textContent = `(${filtered.length} exercises)`;
}

// ---- Add exercise to workout ----
let nextId = 1;
function addExercise(name, muscle, equipment) {
  workoutExercises.push({
    id: nextId++,
    name,
    muscle,
    equipment,
    sets: 3,
    reps: 10,
    setDuration: 30,
    restBetween: 90,
    restAfter: 60,
    setupTime: 30,
    setupNote: '',
    timerMode: 'countdown',
  });
  renderWorkout();
}

// ---- Render workout ----
function renderWorkout() {
  const container = document.getElementById('workoutExercises');
  const summary = document.getElementById('workoutSummary');

  if (workoutExercises.length === 0) {
    container.innerHTML = '<div class="empty-state">Click "Add" on exercises from the library to build your workout.</div>';
    summary.style.display = 'none';
    document.getElementById('workoutExerciseCount').textContent = '';
    return;
  }

  summary.style.display = 'flex';
  document.getElementById('workoutExerciseCount').textContent = `(${workoutExercises.length})`;

  container.innerHTML = workoutExercises.map((ex, idx) => `
    <div class="workout-exercise" data-id="${ex.id}">
      <div class="exercise-header">
        <div style="display:flex;align-items:center;">
          <div class="move-btns">
            <button class="move-btn" onclick="moveExercise(${ex.id}, -1)" ${idx === 0 ? 'disabled' : ''} title="Move up">&#9650;</button>
            <button class="move-btn" onclick="moveExercise(${ex.id}, 1)" ${idx === workoutExercises.length - 1 ? 'disabled' : ''} title="Move down">&#9660;</button>
          </div>
          <div>
            <h3>${ex.name}</h3>
            <div class="exercise-meta">${ex.muscle} &middot; ${ex.equipment}</div>
          </div>
        </div>
        <button class="remove-btn" onclick="removeExercise(${ex.id})">Remove</button>
      </div>
      <div class="exercise-config">
        <div class="field">
          <label>Sets</label>
          <input type="number" value="${ex.sets}" min="1" max="20" onchange="updateExercise(${ex.id}, 'sets', +this.value)">
        </div>
        <div class="field">
          <label>Reps</label>
          <input type="number" value="${ex.reps}" min="1" max="100" onchange="updateExercise(${ex.id}, 'reps', +this.value)">
        </div>
        <div class="field">
          <label>Set Duration (s)</label>
          <input type="number" value="${ex.setDuration}" min="5" max="600" onchange="updateExercise(${ex.id}, 'setDuration', +this.value)">
        </div>
        <div class="field">
          <label>Rest Between (s)</label>
          <input type="number" value="${ex.restBetween}" min="0" max="600" onchange="updateExercise(${ex.id}, 'restBetween', +this.value)">
        </div>
        <div class="field">
          <label>Timer Mode</label>
          <select onchange="updateExercise(${ex.id}, 'timerMode', this.value)">
            <option value="countdown" ${ex.timerMode === 'countdown' ? 'selected' : ''}>Countdown</option>
            <option value="countup" ${ex.timerMode === 'countup' ? 'selected' : ''}>Count Up</option>
          </select>
        </div>
      </div>
      <div class="setup-config">
        <div class="field">
          <label>Setup Time (s)</label>
          <input type="number" value="${ex.setupTime}" min="0" max="300" onchange="updateExercise(${ex.id}, 'setupTime', +this.value)">
        </div>
        <div class="field">
          <label>Setup Instructions</label>
          <input type="text" value="${ex.setupNote}" placeholder="e.g. Load 135 lbs on barbell" onchange="updateExercise(${ex.id}, 'setupNote', this.value)">
        </div>
      </div>
    </div>
  `).join('');

  updateSummary();
}

function updateExercise(id, field, value) {
  const ex = workoutExercises.find(e => e.id === id);
  if (ex) { ex[field] = value; updateSummary(); }
}

function removeExercise(id) {
  workoutExercises = workoutExercises.filter(e => e.id !== id);
  renderWorkout();
}

function moveExercise(id, direction) {
  const idx = workoutExercises.findIndex(e => e.id === id);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= workoutExercises.length) return;
  [workoutExercises[idx], workoutExercises[newIdx]] = [workoutExercises[newIdx], workoutExercises[idx]];
  renderWorkout();
}

function clearWorkout() {
  if (workoutExercises.length > 0 && !confirm('Clear all exercises?')) return;
  workoutExercises = [];
  renderWorkout();
}

function updateSummary() {
  let totalSets = 0;
  let totalSeconds = 8; // intro
  totalSeconds += parseInt(document.getElementById('cooldownDuration').value) || 60;

  for (const ex of workoutExercises) {
    totalSets += ex.sets;
    totalSeconds += ex.setupTime;
    totalSeconds += ex.sets * ex.setDuration;
    totalSeconds += (ex.sets - 1) * ex.restBetween;
    totalSeconds += ex.restAfter || 0;
  }

  document.getElementById('sumExercises').textContent = workoutExercises.length;
  document.getElementById('sumSets').textContent = totalSets;
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  document.getElementById('sumDuration').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

// ---- Generate JSON ----
function buildJSON() {
  const title = document.getElementById('workoutTitle').value || 'My Workout';
  const subtitle = document.getElementById('workoutSubtitle').value || '';
  const cooldown = parseInt(document.getElementById('cooldownDuration').value) || 60;
  const primaryColor = document.getElementById('primaryColor').value || '#FF6B35';
  const bgColor = document.getElementById('bgColor').value || '#1A1A2E';

  const phases = [];

  // Intro
  phases.push({ type: 'intro', title, subtitle, duration: 8 });

  // Exercises
  for (let i = 0; i < workoutExercises.length; i++) {
    const ex = workoutExercises[i];

    if (ex.setupTime > 0) {
      const setup = { type: 'setup', title: `Set Up For ${ex.name}`, duration: ex.setupTime };
      if (ex.setupNote) setup.instructions = ex.setupNote;
      phases.push(setup);
    }

    const sets = [];
    for (let s = 1; s <= ex.sets; s++) {
      const isLast = s === ex.sets;
      sets.push({
        setNumber: s,
        reps: ex.reps,
        timerMode: ex.timerMode,
        duration: ex.setDuration,
        rest: isLast ? (ex.restAfter || 0) : ex.restBetween,
      });
    }

    phases.push({ type: 'exercise', title: ex.name, sets });
  }

  // Cooldown
  phases.push({ type: 'cooldown', title: 'Cool Down & Stretch', duration: cooldown });

  return {
    workout: {
      title,
      style: { primaryColor, backgroundColor: bgColor },
    },
    phases,
  };
}

function downloadJSON() {
  if (workoutExercises.length === 0) { alert('Add at least one exercise first.'); return; }
  const data = buildJSON();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = data.workout.title.replace(/[^a-zA-Z0-9\s-]/g, '').replace(/\s+/g, '-').toLowerCase();
  a.href = url;
  a.download = `${safeName}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function copyJSON() {
  if (workoutExercises.length === 0) { alert('Add at least one exercise first.'); return; }
  const data = buildJSON();
  const json = JSON.stringify(data, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    alert('JSON copied to clipboard! Paste into a file in the workouts/ folder.');
  });
}

document.getElementById('primaryColor').addEventListener('input', e => { document.getElementById('primaryColorPicker').value = e.target.value; });
document.getElementById('bgColorPicker').addEventListener('input', e => { document.getElementById('bgColor').value = e.target.value; });
document.getElementById('bgColor').addEventListener('input', e => { document.getElementById('bgColorPicker').value = e.target.value; });
document.getElementById('cooldownDuration').addEventListener('input', updateSummary);

// ---- Init ----
document.getElementById('searchInput').addEventListener('input', renderExerciseList);
muscleFilter.addEventListener('change', renderExerciseList);
equipmentFilter.addEventListener('change', renderExerciseList);
renderExerciseList();
renderWorkout();
</script>
